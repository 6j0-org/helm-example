# Default values for vouch.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: quay.io/vouch/vouch-proxy
  tag: "{{ .Chart.AppVersion }}"
  pullPolicy: IfNotPresent

# Allow to specify an alternate command before launching vouch
# ex: command: ["/bin/sh", "-c", "source /vault/secrets/config && /vouch-proxy"]
command: []
args: []

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # privileged: true
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  externalTrafficPolicy:
  type: ClusterIP
  port: 9090

probes:
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 5
  readiness:
    enabled: true
    initialDelaySeconds: 0
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 5
    periodSeconds: 10
  startup:
    enabled: true
    initialDelaySeconds: 5
    failureThreshold: 30
    periodSeconds: 10

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: "default"
  paths: ["/"]
  hosts:
    - oauth2-proxy.dev.6j0.org
  tls:
    - secretName: vouch-tls
      hosts:
        - oauth2-proxy.dev.6j0.org

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #  cpu: 100m
  #  memory: 128Mi
  # requests:
  #  cpu: 100m
  #  memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

deploymentAnnotations: {}

# vouch config
# bare minimum to get vouch running with google

config:
  vouch:
    port: 9090
    domains:
      - 6j0.org
    allowAllUsers: false
    whiteList: []
    testing: false

  oauth:
    provider: google
    # https://console.developers.google.com/apis/credentials
    client_id: "845675443673-2htsorbbi7t6iinrk0guchm807r6dokf.apps.googleusercontent.com"
    callback_urls:
      - https://oauth2-proxy.dev.6j0.org/auth
    preferredDomain:

# existingSecretName -- Allow overriding the config value with an existing secret, like a sealed secret
existingSecretName: ""

# An array to add extra environment variables
# Example:
# extraEnvVars:
#   - name: HTTPS_PROXY
#     value: "https://example.com"
extraEnvVars: []
